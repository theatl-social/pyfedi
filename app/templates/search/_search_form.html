<form action="" method="get" class="form pb-4" role="form">
    <div class="sort_methods btn-group mt-0 mb-4" aria-label="{{ _('What to search for: ') }}">
        <input type="radio" name="search_for" class="btn-check" id="btncheck1" autocomplete="off" value="posts" {{ 'checked' if search_for | default('posts') == 'posts' else '' }}>
        <label class="btn btn-outline-primary" for="btncheck1">{{ _('Posts') }}</label>

        <input type="radio" name="search_for" class="btn-check" id="btncheck2" autocomplete="off" value="comments" {{ 'checked' if search_for | default('') == 'comments' else '' }}>
        <label class="btn btn-outline-primary" for="btncheck2">{{ _('Comments') }}</label>

        <input type="radio" name="search_for" class="btn-check" id="btncheck3" autocomplete="off" value="communities" {{ 'checked' if search_for | default('') == 'communities' else '' }}>
        <label class="btn btn-outline-primary" for="btncheck3">{{ _('Communities') }}</label>
    </div>
    <div class="form-group"><label class="form-control-label" for="search_term" aria-label="{{ _('Search here') }}">{{ _('Keyword') }} ({{ _('optional') }})</label>
        <input autofocus="" class="form-control" id="search_term" name="q" type="search" value="{{ q | default('') }}">
    </div>
    <div class="form-group"><label class="form-control-label" for="community" aria-label="{{ _('Restrict results by community') }}">{{ _('Community') }}</label>
        <input type="text" class="form-control" id="community" name="community"
               list="community_suggestions"
               hx-post="/post/search_community_suggestions"
               hx-trigger="keyup delay:500ms"
               hx-target="#community_suggestions"
               hx-swap="innerHTML settle:0ms"
               autocomplete="off"
               value="{{ community | default('') }}"
               pattern="!?[^@\s]+@[^@\s]+\.[^@\s]+"
               title="{{ _('Enter a community name in the format community@server.name') }}"
        >
        <datalist id="community_suggestions"></datalist>
    </div>
    <fieldset class="mt-4 mb-4 coolfieldset collapsed">
        <legend class="w-auto">{{ _('More options') }}</legend>
            <div class="form-group"><label class="form-control-label" for="type" aria-label="{{ _('Restrict results by type') }}">{{ _('Type') }}</label>
            <select class="form-control form-select" id="type" name="type">
                <option value="0" {{ 'selected' if type | default(0) == 0 else '' }}>{{ _('All') }}</option>
                <option value="{{ POST_TYPE_ARTICLE }}" {{ 'selected' if type | default(0) == POST_TYPE_ARTICLE else '' }}>{{ _('Discussion') }}</option>
                <option value="{{ POST_TYPE_LINK }}" {{ 'selected' if type | default(0) == POST_TYPE_LINK else '' }}>{{ _('Link') }}</option>
                <option value="{{ POST_TYPE_IMAGE }}" {{ 'selected' if type | default(0) == POST_TYPE_IMAGE else '' }}>{{ _('Image') }}</option>
                <option value="{{ POST_TYPE_VIDEO }}" {{ 'selected' if type | default(0) == POST_TYPE_VIDEO else '' }}>{{ _('Video') }}</option>
                <option value="{{ POST_TYPE_POLL }}" {{ 'selected' if type | default(0) == POST_TYPE_POLL else '' }}>{{ _('Poll') }}</option>
            </select>
        </div>
        <div class="form-group"><label class="form-control-label" for="language" aria-label="{{ _('Restrict results by language') }}">{{ _('Language') }}</label>
            <select class="form-control form-select" id="language" name="language">
                <option value="0" {{ 'selected' if language_id | default(0) == 0 else '' }}>{{ _('All') }}</option>
                {% for language in languages %}
                    <option value="{{ language.id }}" {{ 'selected' if language_id | default(0) == language.id else '' }}>{{ language.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-control-label" for="software" aria-label="{{ _('Restrict results by instance software') }}">{{ _('Instance Software') }}</label>
            <select class="form-control form-select" id="software" name="software">
                <option value="" {{ 'selected' if software | default('') == '' else '' }}>{{ _('All') }}</option>
                {% for sw in instance_software %}
                    {% if not sw == 'guppe groups' %}
                        <option value="{{ sw }}" {{ 'selected' if software | default('') == sw else '' }}>{{ sw }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
        <div class="form-group"><label class="form-control-label" for="sort_by" aria-label="{{ _('Sort results') }}">{{ _('Sort by') }}</label>
            <select class="form-control form-select" id="sort_by" name="sort_by">
                <option value="" {{ 'selected' if sort_by | default('') == '' else '' }}>{{ _('Relevance') }}</option>
                <option value="date" {{ 'selected' if sort_by | default('') == 'date' else '' }}>{{ _('Recent first') }}</option>
                <option value="top" {{ 'selected' if sort_by | default('') == 'top' else '' }}>{{ _('Top') }}</option>
            </select>
        </div>
        <div class="form-group"><label class="form-control-label" for="nsfw" aria-label="{{ _('NSFW') }}">{{ _('NSFW') }}</label>
            <select class="form-control form-select" id="nsfw" name="nsfw">
                <option value="" {{ 'selected' if nsfw | default('') == '' else '' }}>{{ _('Use my profile settings') }}</option>
                <option value="only" {{ 'selected' if nsfw | default('') == 'only' else '' }}>{{ _('Only NSFW') }}</option>
                <option value="include" {{ 'selected' if nsfw | default('') == 'include' else '' }}>{{ _('Include NSFW') }}</option>
                <option value="exclude" {{ 'selected' if nsfw | default('') == 'exclude' else '' }}>{{ _('No NSFW') }}</option>
            </select>
        </div>
        <div class="form-group"><label class="form-control-label" for="minimum_upvote" aria-label="{{ _('Minimum score') }}">{{ _('Minimum score') }} ({{ _('optional') }})</label>
            <input class="form-control" id="minimum_upvote" name="minimum_upvote" type="text" inputmode="numeric" pattern="\d+" value="{{ minimum_upvote | default('') }}">
        </div>
    </fieldset>

    <input class="btn btn-primary btn-md" id="submit" name="submit" type="submit" value="{{ _('Search') }}">
</form>
